<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="AI Builders Daily：每日追踪一线 AI Builders 的观点动态、深度文章与播客摘录。">
<meta name="generator" content="Kami + Hermes">
<title>AI Builders Daily</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23f5f4ed'/%3E%3Ctext x='50' y='63' text-anchor='middle' font-size='52'%3E紙%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#f5f4ed;color:#141413;font-family:"Songti SC","STSong","Source Han Serif SC","Noto Serif CJK SC",Georgia,serif;line-height:1.58;-webkit-font-smoothing:antialiased}::selection{background:#e4ecf5;color:#1b365d}
:root{--paper:#f5f4ed;--ivory:#fffdf8;--panel:#faf9f5;--border:#e5e3d8;--brand:#1B365D;--brand2:#2D5A8A;--ink:#141413;--muted:#504e49;--stone:#77746b;--soft:#eaf0f7;--radius:20px;--shadow:0 14px 40px rgba(20,20,19,.055)}
a{color:var(--brand);text-decoration:none}a:hover{text-decoration:underline}.wrap{max-width:1120px;margin:0 auto;padding:0 22px}.small,.chip,.metric span,.meta,.source,.date-pill,.type-pill{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif}.small,.meta{font-size:.78rem;color:var(--stone)}
.hero{padding:64px 0 28px;border-bottom:1px solid var(--border)}.hero-grid{display:grid;grid-template-columns:1.35fr .65fr;gap:24px;align-items:end}.eyebrow{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--brand);font-weight:750}.hero h1{font-size:clamp(2.65rem,8vw,5.7rem);line-height:.96;margin:14px 0 18px;font-weight:500;letter-spacing:-.045em}.lead{font-size:clamp(1rem,2.1vw,1.24rem);max-width:790px;color:var(--muted);margin:0}.meta-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}.meta-card .date{font-size:1.38rem;font-weight:500;color:var(--brand);margin:4px 0 8px}.meta-list{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}.metric{background:var(--ivory);border:1px solid var(--border);border-radius:14px;padding:12px}.metric b{display:block;font-size:1.5rem;line-height:1;color:var(--ink);font-weight:500}.metric span{font-size:.76rem;color:var(--stone)}
.toolbar{position:sticky;top:0;z-index:20;background:rgba(245,244,237,.9);backdrop-filter:blur(18px);border-bottom:1px solid var(--border)}.toolbar .wrap{padding-top:12px;padding-bottom:12px}.rail{display:flex;gap:8px;overflow:auto;scrollbar-width:none}.rail::-webkit-scrollbar{display:none}.date-pill,.type-pill{border:1px solid var(--border);background:rgba(255,253,248,.75);color:var(--stone);border-radius:999px;padding:8px 14px;font-size:.86rem;white-space:nowrap;cursor:pointer}.date-pill.active,.type-pill.active{background:var(--brand);border-color:var(--brand);color:white}.date-pill:hover:not(.active),.type-pill:hover:not(.active){background:var(--soft);color:var(--brand)}
main{padding:32px 0 72px}.section-head{display:flex;justify-content:space-between;gap:18px;align-items:end;margin:28px 0 16px}.section-head h2{font-size:1.42rem;margin:0;font-weight:500;letter-spacing:-.02em}.section-head p{margin:6px 0 0;color:var(--stone);font-size:.92rem}.panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow)}.headline{font-size:1.28rem;line-height:1.46;margin:0;color:var(--brand);font-weight:500}.note{margin:12px 0 0;color:var(--muted)}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}.tag{display:inline-flex;align-items:center;background:#e4ecf5;color:var(--brand);border-radius:999px;padding:2px 8px;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;font-size:.7rem;font-weight:650}
.top-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.top-card,.feed-card{background:var(--ivory);border:1px solid var(--border);border-radius:18px;padding:18px;transition:.2s}.top-card:hover,.feed-card:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(20,20,19,.07)}.top-card h3,.feed-card h3{font-size:1.08rem;line-height:1.35;margin:8px 0 9px;font-weight:500}.top-card p,.feed-card p{font-size:.93rem;color:var(--muted);margin:0}.type-bar{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 18px}.feed{display:grid;grid-template-columns:1fr;gap:14px}.feed-card{display:grid;grid-template-columns:180px 1fr;gap:18px}.feed-card .source{font-size:.82rem;color:var(--stone);margin-top:8px}.feed-card .meta strong{display:block;color:var(--ink);font-family:"Songti SC","STSong","Source Han Serif SC","Noto Serif CJK SC",Georgia,serif;font-size:1.02rem;margin-top:4px}.footer{border-top:1px solid var(--border);padding:24px 0 36px;color:var(--stone);font-size:.86rem}.empty{padding:28px;background:var(--panel);border:1px dashed var(--border);border-radius:16px;color:var(--stone)}
@media(max-width:900px){.hero-grid{grid-template-columns:1fr}.top-grid{grid-template-columns:1fr 1fr}.feed-card{grid-template-columns:1fr}.feed-card .meta{border-bottom:1px solid var(--border);padding-bottom:10px}.section-head{display:block}}@media(max-width:620px){.wrap{padding:0 15px}.hero{padding-top:42px}.hero h1{font-size:2.75rem}.top-grid{grid-template-columns:1fr}.meta-list{grid-template-columns:repeat(4,1fr)}.metric{padding:10px 8px}.metric b{font-size:1.14rem}.panel{padding:18px}}
</style>
</head>
<body>
<header class="hero">
  <div class="wrap hero-grid">
    <div>
      <div class="eyebrow">Lance / AI Builders Briefing</div>
      <h1>AI Builders Daily</h1>
      <p class="lead">每日追踪一线 AI Builders 的观点动态、深度文章与播客讨论。这里不是泛新闻聚合，而是观察真正构建 AI 产品、模型、工具和公司的人的公开表达。</p>
    </div>
    <aside class="meta-card" aria-label="当前日期简报">
      <div class="small">当前简报</div>
      <div class="date" id="heroDate">加载中…</div>
      <div class="small" id="heroGenerated">等待数据</div>
      <div class="meta-list">
        <div class="metric"><b id="mBuilders">–</b><span>AI Builders</span></div>
        <div class="metric"><b id="mTweets">–</b><span>观点动态</span></div>
        <div class="metric"><b id="mBlogs">–</b><span>深度文章</span></div>
        <div class="metric"><b id="mPodcasts">–</b><span>播客摘录</span></div>
      </div>
    </aside>
  </div>
</header>
<div class="toolbar"><div class="wrap"><div class="rail" id="dateRail" aria-label="选择日期"></div></div></div>
<main class="wrap">
  <section>
    <div class="panel"><p class="headline" id="headline">加载今日摘要…</p><p class="note" id="editorNote"></p><div class="tags" id="topTags"></div></div>
  </section>
  <section>
    <div class="section-head"><div><h2>今日重点</h2><p>从当前日期的信息流中挑出最值得关注的高信号观点。</p></div></div>
    <div class="top-grid" id="topPicks"></div>
  </section>
  <section>
    <div class="section-head"><div><h2>内容流</h2><p>先按日期查看，再按类型筛选：观点动态、深度文章、播客摘录。</p></div></div>
    <div class="type-bar" id="typeBar"></div>
    <div class="feed" id="feed"></div>
  </section>
</main>
<footer class="footer"><div class="wrap">数据来自 <a href="https://github.com/zarazhangrui/follow-builders" target="_blank" rel="noopener">follow-builders</a> · Kami 风格排版 · 每天 08:30 自动更新</div></footer>
<script>
let DIGESTS=[]; let selectedDate=null; let selectedType='all';
const $=id=>document.getElementById(id);
const TYPES=[['all','全部'],['post','观点动态'],['blog','深度文章'],['podcast','播客摘录']];
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function tagsHTML(tags){return (tags||[]).map(t=>`<span class="tag">${esc(t.name||t)}</span>`).join('');}
function fmtTime(iso){if(!iso)return '未知时间'; try{return new Date(iso).toLocaleString('zh-CN',{timeZone:'Asia/Shanghai',month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return iso}}
function currentDigest(){return DIGESTS.find(d=>d.date===selectedDate)||DIGESTS[0]||{};}
function itemTitle(x){return x.chineseTitle||x.title||x.summary||'未命名内容';}
function normalizeItems(d){
  const items=[];
  (d.builders||[]).forEach(b=>(b.tweets||[]).forEach(t=>items.push({type:'post',typeLabel:'观点动态',date:t.sourceDisplayDate||t.sourceDate||d.displayDate||d.date,actor:b.name||b.handle,meta:(b.handle?`@${b.handle}`:'')+' · X',title:t.chineseTitle||t.summary,summary:t.summary,text:t.text,tags:t.tags,url:t.url,score:t.engagement||0})));
  (d.blogs||[]).forEach(p=>items.push({type:'blog',typeLabel:'深度文章',date:p.sourceDisplayDate||p.sourceDate||d.displayDate||d.date,actor:p.name,title:itemTitle(p),summary:p.summary,tags:p.tags,url:p.url,score:0}));
  (d.podcasts||[]).forEach(p=>items.push({type:'podcast',typeLabel:'播客摘录',date:p.sourceDisplayDate||p.sourceDate||d.displayDate||d.date,actor:p.name,title:itemTitle(p),summary:p.summary,tags:p.tags,url:p.url,score:0}));
  return items;
}
async function load(){try{let r=await fetch('data/digests.json?ts='+Date.now()); DIGESTS=await r.json(); if(!Array.isArray(DIGESTS)||!DIGESTS.length)throw new Error('empty'); selectedDate=DIGESTS[0].date; renderAll();}catch(e){$('headline').textContent='暂无数据。请先运行 scripts/update_daily.py 生成 data/digests.json。'; console.error(e);}}
function renderAll(){renderDateRail(); renderTypeBar(); render(currentDigest());}
function renderDateRail(){const rail=$('dateRail'); rail.innerHTML=DIGESTS.map((d,i)=>`<button class="date-pill ${d.date===selectedDate?'active':''}" data-date="${esc(d.date)}">${i===0?'今天 · ':''}${esc(d.displayDate||d.date)}</button>`).join(''); rail.querySelectorAll('button').forEach(b=>b.onclick=()=>{selectedDate=b.dataset.date; selectedType='all'; renderAll();});}
function renderTypeBar(){const bar=$('typeBar'); bar.innerHTML=TYPES.map(([k,v])=>`<button class="type-pill ${k===selectedType?'active':''}" data-type="${k}">${v}</button>`).join(''); bar.querySelectorAll('button').forEach(b=>b.onclick=()=>{selectedType=b.dataset.type; render(currentDigest()); renderTypeBar();});}
function render(d){$('heroDate').textContent=d.displayDate||d.date||'暂无日期'; $('heroGenerated').textContent='更新于 '+fmtTime(d.generatedAt); $('mBuilders').textContent=d.stats?.builders??0; $('mTweets').textContent=d.stats?.tweets??0; $('mBlogs').textContent=d.stats?.blogs??0; $('mPodcasts').textContent=d.stats?.podcasts??0; $('headline').textContent=d.headline||''; $('editorNote').textContent=d.editorNote||''; $('topTags').innerHTML=tagsHTML(d.stats?.topTags||[]);
  const picks=(d.toplines||[]).slice(0,5); $('topPicks').innerHTML=picks.map(x=>`<article class="top-card"><div class="small">${esc(x.sourceDisplayDate||x.sourceDate||d.displayDate||d.date)} · ${esc((x.source||'X 动态').replace(' on X',' · X 动态'))}</div><h3>${esc(itemTitle(x))}</h3><p>${esc(x.summary)}</p><div class="tags">${tagsHTML(x.tags)}</div><div class="source"><a href="${esc(x.url)}" target="_blank" rel="noopener">查看原文 ↗</a></div></article>`).join('')||'<div class="empty">暂无今日重点</div>';
  let items=normalizeItems(d); if(selectedType!=='all')items=items.filter(x=>x.type===selectedType); $('feed').innerHTML=items.map(x=>`<article class="feed-card"><div class="meta"><span>${esc(x.typeLabel)} · ${esc(x.date)}</span><strong>${esc(x.actor)}</strong><div>${esc(x.meta||'')}</div></div><div><h3>${esc(x.title)}</h3><p>${esc(x.summary)}</p><div class="tags">${tagsHTML(x.tags)}</div><div class="source"><a href="${esc(x.url)}" target="_blank" rel="noopener">${x.type==='podcast'?'播放 / 查看':'查看原文'} ↗</a></div></div></article>`).join('')||'<div class="empty">当前类型暂无内容</div>';
}
load();
</script>
</body>
</html>
